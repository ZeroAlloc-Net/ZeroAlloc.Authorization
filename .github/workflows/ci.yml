name: CI

on:
  push:
    branches: [main, 'release-please--**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-commits:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yml

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Calculate version
        id: gitversion
        run: |
          version=$(dotnet dotnet-gitversion /output json /showvariable SemVer)
          echo "semver=$version" >> $GITHUB_OUTPUT
          echo "Calculated version: $version"

      - name: Restore
        run: dotnet restore ZeroAlloc.Authorization.slnx

      - name: Build
        run: dotnet build ZeroAlloc.Authorization.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ZeroAlloc.Authorization.slnx --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"

      - name: Pack (verify)
        run: dotnet pack ZeroAlloc.Authorization.slnx --configuration Release --no-build --output ./artifacts

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./artifacts/*.nupkg

  aot-smoke:
    runs-on: ubuntu-latest
    # Publishes samples/ZeroAlloc.Authorization.AotSmoke with PublishAot=true.
    # Exercises the authorization pipeline end-to-end — the generator emits the
    # policy composition as a proxy so any reflection regression shows as an
    # IL2026/IL3050 error during ILC.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install AOT native toolchain
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore samples/ZeroAlloc.Authorization.AotSmoke/ZeroAlloc.Authorization.AotSmoke.csproj

      - name: Publish AOT
        run: dotnet publish samples/ZeroAlloc.Authorization.AotSmoke/ZeroAlloc.Authorization.AotSmoke.csproj -r linux-x64 -c Release -o ./aot-out

      - name: Run AOT binary
        run: ./aot-out/ZeroAlloc.Authorization.AotSmoke

  api-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install ApiCompat tool
        run: dotnet tool install --global Microsoft.DotNet.ApiCompat.Tool
      - name: Build current (sentinel assembly version >= any baseline so CP0003 never fires)
        run: dotnet build src/ZeroAlloc.Authorization/ZeroAlloc.Authorization.csproj -c Release -p:Version=9999.0.0 -p:AssemblyVersion=9999.0.0.0 -p:FileVersion=9999.0.0.0
      - name: Pack current
        run: dotnet pack src/ZeroAlloc.Authorization/ZeroAlloc.Authorization.csproj -c Release --no-build --output ./current -p:Version=9999.0.0 -p:AssemblyVersion=9999.0.0.0 -p:FileVersion=9999.0.0.0
      - name: Compare against latest published version
        # Take the highest released stable version overall (no major filter,
        # exclude prerelease tags). Steady-state this gates each x.y.(z+1)
        # patch against x.y.z and each x.(y+1).0 against x.y.(latest). Major
        # bumps temporarily fire on intentional breaks, which is the right cost.
        run: |
          latest=$(curl -s https://api.nuget.org/v3-flatcontainer/zeroalloc.authorization/index.json \
                   | jq -r '.versions[]' | grep -vE '(-|preview|alpha|beta|rc)' | tail -1)
          if [ -z "$latest" ]; then
            echo "No stable releases on nuget.org yet — skipping baseline check."
            exit 0
          fi
          echo "Comparing against published version: $latest"
          mkdir -p ./baseline
          curl -sL "https://api.nuget.org/v3-flatcontainer/zeroalloc.authorization/$latest/zeroalloc.authorization.$latest.nupkg" \
               -o ./baseline/baseline.nupkg
          apicompat package ./current/*.nupkg --baseline-package ./baseline/baseline.nupkg
