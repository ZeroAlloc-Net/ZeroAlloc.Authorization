workflow: GitHubFlow/v1
mode: ContinuousDelivery
branches:
  main:
    label: ''
    increment: Patch
    prevent-increment:
      of-merged-branch: true
    regex: ^master$|^main$
    is-main-branch: true
  feature:
    mode: ManualDeployment
    label: '{BranchName}'
    increment: Minor
    regex: ^features?[/-](?<BranchName>.+)
    source-branches:
    - main
  pull-request:
    mode: ContinuousDelivery
    label: PullRequest{Number}
    increment: Inherit
    prevent-increment:
      of-merged-branch: true
    regex: ^(pull-requests|pull|pr)[/-](?<Number>\d*)
    source-branches:
    - main
    - feature
